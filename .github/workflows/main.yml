name: Build HAP

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'artwork/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build Mode'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build EhViewer HAP
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sanchuanhehe/harmony-next-pipeline-docker/harmonyos-ci-image:latest

    env:
      BUILD_MODE: ${{ github.event.inputs.build_mode || 'debug' }}
      OHOS_SDK_HOME: /opt/ohos-sdk
      # 确保 oh_modules/.bin 被包含在 PATH 中，以便直接调用本地 hvigor
      PATH: ./oh_modules/.bin:/opt/harmonyos-tools/command-line-tools/tool/node/bin:/opt/harmonyos-tools/command-line-tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/bin:/sbin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify build environment
        run: |
          echo "=== Node.js ==="
          node -v || echo "node not found in PATH"
          
          echo "=== ohpm ==="
          ohpm -v || echo "ohpm not found in PATH"
          
          echo "=== hvigor ==="
          which hvigor || echo "hvigor not found in PATH"
          hvigor -v || echo "hvigor command failed"
          
          echo "=== hvigorw ==="
          ls -la hvigorw 2>/dev/null || echo "hvigorw not in project root"
          ls -la entry/hvigorw 2>/dev/null || echo "hvigorw not in entry/"
          
          echo "=== SDK path ==="
          ls -la /opt/ 2>/dev/null || true
          find /opt -maxdepth 2 -name "sdk" -type d 2>/dev/null || true
          find /opt -maxdepth 3 -name "command-line-tools" -type d 2>/dev/null || true

      - name: Configure SDK path
        run: |
          SDK_PATH=""
          if [ -d "/opt/ohos-sdk" ]; then
            SDK_PATH="/opt/ohos-sdk"
          elif [ -d "/opt/harmonyos-sdk" ]; then
            SDK_PATH="/opt/harmonyos-sdk"
          elif [ -d "/opt/sdk" ]; then
            SDK_PATH="/opt/sdk"
          else
            SDK_PATH=$(find /opt -maxdepth 3 -name "openharmony" -type d 2>/dev/null | head -1)
            if [ -z "$SDK_PATH" ]; then
              SDK_PATH=$(find /opt -maxdepth 3 -name "sdk" -type d 2>/dev/null | head -1)
            fi
          fi
          
          if [ -n "$SDK_PATH" ]; then
            echo "sdk.dir=$SDK_PATH" > local.properties
            echo "SDK path set to: $SDK_PATH"
          else
            echo "WARNING: SDK path not found, using default"
            echo "sdk.dir=/opt/ohos-sdk" > local.properties
          fi
          
          cat local.properties

      - name: Install ohpm dependencies
        run: |
          ohpm config set registry https://ohpm.openharmony.cn/ohpm/ || true
          ohpm install --all
          
          echo "=== Installed packages ==="
          ls -la oh_modules/ 2>/dev/null || echo "oh_modules not in root"
          ls -la entry/oh_modules/ 2>/dev/null || echo "oh_modules not in entry"

      - name: Validate and prepare hvigor executable
        run: |
          HVIGOR_BIN="./oh_modules/.bin/hvigor"
          if [ ! -f "$HVIGOR_BIN" ]; then
            echo "ERROR: hvigor not found at $HVIGOR_BIN after ohpm install"
            echo "Available in .bin directory:"
            ls -la ./oh_modules/.bin/ 2>/dev/null || echo "No bin directory or permission denied"
            exit 1
          fi
          
          # 确保 hvigor 具有可执行权限
          chmod +x "$HVIGOR_BIN"
          echo "Successfully set execute permission for $HVIGOR_BIN"
          
          # 验证是否可通过 PATH 直接调用（因已加入环境变量）
          if ! command -v hvigor &> /dev/null; then
            echo "WARNING: hvigor is not accessible via PATH despite being in ./oh_modules/.bin"
          else
            echo "hvigor is now available via PATH: $(which hvigor)"
          fi

      - name: Locate hvigor executable (Prioritize hvigorw if present)
        id: find_hvigor
        run: |
          HVIGOR_CMD=""
          
          # 优先使用项目根目录或 entry 目录下的 hvigorw 包装脚本
          if [ -f "./hvigorw" ]; then
            chmod +x ./hvigorw
            HVIGOR_CMD="./hvigorw"
          elif [ -f "./entry/hvigorw" ]; then
            chmod +x ./entry/hvigorw
            HVIGOR_CMD="./entry/hvigorw"
          fi
          
          # 回退到本地安装的 hvigor
          if [ -z "$HVIGOR_CMD" ] && [ -f "./oh_modules/.bin/hvigor" ]; then
            HVIGOR_CMD="hvigor"  # 已通过 PATH 配置可直接访问
          elif [ -z "$HVIGOR_CMD" ] && [ -f "./node_modules/.bin/hvigor" ]; then
            HVIGOR_CMD="./node_modules/.bin/hvigor"
          fi
          
          # 最后尝试 npx
          if [ -z "$HVIGOR_CMD" ] && command -v npx &> /dev/null; then
            HVIGOR_CMD="npx hvigor"
          fi
          
          if [ -z "$HVIGOR_CMD" ]; then
            echo "ERROR: No hvigor executable found in any known location"
            exit 1
          fi
          
          echo "hvigor_cmd=$HVIGOR_CMD" >> $GITHUB_OUTPUT
          echo "Using hvigor command: $HVIGOR_CMD"

      - name: Build HAP (Debug)
        if: env.BUILD_MODE == 'debug'
        run: |
          HVIGOR="${{ steps.find_hvigor.outputs.hvigor_cmd }}"
          echo "=== Building Debug HAP with: $HVIGOR ==="
          
          $HVIGOR clean assembleHap \
            --mode module \
            -p product=default \
            -p buildMode=debug \
            --no-daemon
          
          echo "=== Build Output ==="
          find . -name "*.hap" -type f 2>/dev/null || echo "No .hap files found"
          find . -name "*.app" -type f 2>/dev/null || echo "No .app files found"

      - name: Build HAP (Release)
        if: env.BUILD_MODE == 'release'
        run: |
          HVIGOR="${{ steps.find_hvigor.outputs.hvigor_cmd }}"
          echo "=== Building Release HAP with: $HVIGOR ==="
          
          $HVIGOR clean assembleHap \
            --mode module \
            -p product=default \
            -p buildMode=release \
            --no-daemon
          
          echo "=== Build Output ==="
          find . -name "*.hap" -type f 2>/dev/null || echo "No .hap files found"
          find . -name "*.app" -type f 2>/dev/null || echo "No .app files found"

      - name: Collect build artifacts
        if: always()
        run: |
          mkdir -p artifacts/
          find . -name "*.hap" -type f -exec cp {} artifacts/ \\; 2>/dev/null || true
          find . -path "*/build/*" -name "*.log" -type f -exec cp {} artifacts/ \\; 2>/dev/null || true
          echo "=== Artifacts ==="
          ls -lh artifacts/ || echo "No artifacts found"

      - name: Upload HAP artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EhViewer-OHOS-${{ env.BUILD_MODE }}-${{ github.sha }}
          path: artifacts/*.hap
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            artifacts/*.log
            **/build/reports/
          retention-days: 7
