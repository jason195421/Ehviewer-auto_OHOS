name: Build HAP

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'artwork/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build Mode'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build EhViewer HAP
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sanchuanhehe/harmony-next-pipeline-docker/harmonyos-ci-image:latest

    env:
      BUILD_MODE: ${{ github.event.inputs.build_mode || 'debug' }}
      OHOS_SDK_HOME: /opt/ohos-sdk
      # ✅ 修复1: 将 ./oh_modules/.bin 加入 PATH，解决 hvigor not found
      PATH: ./oh_modules/.bin:/opt/harmonyos-tools/command-line-tools/tool/node/bin:/opt/harmonyos-tools/command-line-tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify build environment
        run: |
          echo "=== Node.js ==="
          node -v || echo "node not found in PATH"

          echo "=== ohpm ==="
          ohpm -v || echo "ohpm not found in PATH"

          echo "=== hvigor ==="
          which hvigor || echo "hvigor not found in PATH"
          hvigor -v || echo "hvigor command failed"

          echo "=== hvigorw ==="
          ls -la hvigorw 2>/dev/null || echo "hvigorw not in project root"
          ls -la entry/hvigorw 2>/dev/null || echo "hvigorw not in entry/"

          echo "=== SDK path ==="
          ls -la /opt/ 2>/dev/null || true
          find /opt -maxdepth 2 -name "sdk" -type d 2>/dev/null || true
          find /opt -maxdepth 3 -name "command-line-tools" -type d 2>/dev/null || true

      - name: Configure SDK path
        run: |
          SDK_PATH=""
          if [ -d "/opt/ohos-sdk" ]; then
            SDK_PATH="/opt/ohos-sdk"
          elif [ -d "/opt/harmonyos-sdk" ]; then
            SDK_PATH="/opt/harmonyos-sdk"
          elif [ -d "/opt/sdk" ]; then
            SDK_PATH="/opt/sdk"
          else
            SDK_PATH=$(find /opt -maxdepth 3 -name "openharmony" -type d 2>/dev/null | head -1)
            if [ -z "$SDK_PATH" ]; then
              SDK_PATH=$(find /opt -maxdepth 3 -name "sdk" -type d 2>/dev/null | head -1)
            fi
          fi

          if [ -n "$SDK_PATH" ]; then
            echo "sdk.dir=$SDK_PATH" > local.properties
            echo "SDK path set to: $SDK_PATH"
          else
            echo "WARNING: SDK path not found, using default"
            echo "sdk.dir=/opt/ohos-sdk" > local.properties
          fi

          cat local.properties

      - name: Install ohpm dependencies
        run: |
          ohpm config set registry https://ohpm.openharmony.cn/ohpm/ || true

          echo "=== Running ohpm install ==="
          ohpm install --all

          echo "=== Installed packages ==="
          ls -la oh_modules/ 2>/dev/null || echo "oh_modules not in root"
          ls -la entry/oh_modules/ 2>/dev/null || echo "oh_modules not in entry"

      - name: Locate hvigor executable
        id: find_hvigor
        run: |
          HVIGOR_CMD=""

          # 1. 尝试项目中的 hvigorw（并赋予执行权限）
          if [ -f "./hvigorw" ]; then
            chmod +x ./hvigorw
            HVIGOR_CMD="./hvigorw"
          elif [ -f "./entry/hvigorw" ]; then
            chmod +x ./entry/hvigorw
            HVIGOR_CMD="./entry/hvigorw"
          fi

          # 2. 尝试全局 hvigor 命令（PATH 中已包含 oh_modules/.bin）
          if [ -z "$HVIGOR_CMD" ]; then
            if command -v hvigor &> /dev/null; then
              HVIGOR_CMD="hvigor"
            fi
          fi

          # 3. 尝试 oh_modules 中的 hvigor
          if [ -z "$HVIGOR_CMD" ]; then
            if [ -f "./oh_modules/.bin/hvigor" ]; then
              chmod +x ./oh_modules/.bin/hvigor
              HVIGOR_CMD="./oh_modules/.bin/hvigor"
            elif [ -f "./node_modules/.bin/hvigor" ]; then
              chmod +x ./node_modules/.bin/hvigor
              HVIGOR_CMD="./node_modules/.bin/hvigor"
            fi
          fi

          # 4. 尝试 npx
          if [ -z "$HVIGOR_CMD" ]; then
            if command -v npx &> /dev/null; then
              HVIGOR_CMD="npx hvigor"
            fi
          fi

          if [ -z "$HVIGOR_CMD" ]; then
            echo "ERROR: hvigor not found in any location"
            echo "=== Debug: listing oh_modules/.bin ==="
            ls -la ./oh_modules/.bin/ 2>/dev/null || echo "oh_modules/.bin not found"
            exit 1
          fi

          echo "hvigor_cmd=$HVIGOR_CMD" >> $GITHUB_OUTPUT
          echo "Using hvigor command: $HVIGOR_CMD"

      - name: Build HAP (Debug)
        if: env.BUILD_MODE == 'debug'
        run: |
          HVIGOR="${{ steps.find_hvigor.outputs.hvigor_cmd }}"
          echo "=== Building Debug HAP with: $HVIGOR ==="

          $HVIGOR clean assembleHap \
            --mode module \
            -p product=default \
            -p buildMode=debug \
            --no-daemon

          echo "=== Build Output ==="
          find . -name "*.hap" -type f 2>/dev/null || echo "No .hap files found"
          find . -name "*.app" -type f 2>/dev/null || echo "No .app files found"

      - name: Build HAP (Release)
        if: env.BUILD_MODE == 'release'
        run: |
          HVIGOR="${{ steps.find_hvigor.outputs.hvigor_cmd }}"
          echo "=== Building Release HAP with: $HVIGOR ==="

          $HVIGOR clean assembleHap \
            --mode module \
            -p product=default \
            -p buildMode=release \
            --no-daemon

          echo "=== Build Output ==="
          find . -name "*.hap" -type f 2>/dev/null || echo "No .hap files found"
          find . -name "*.app" -type f 2>/dev/null || echo "No .app files found"

      # ✅ 修复2: 将 -exec ... \; 改为 -exec ... + 避免 YAML 解析问题
      - name: Collect build artifacts
        if: always()
        run: |
          mkdir -p artifacts/

          # 复制所有 HAP 产物（使用 + 替代 \;）
          find . -name "*.hap" -type f -exec cp {} artifacts/ + 2>/dev/null || true

          # 复制构建日志（使用 + 替代 \;）
          find . -path "*/build/*" -name "*.log" -type f -exec cp {} artifacts/ + 2>/dev/null || true

          echo "=== Artifacts ==="
          ls -lh artifacts/ || echo "No artifacts found"

      - name: Upload HAP artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EhViewer-OHOS-${{ env.BUILD_MODE }}-${{ github.sha }}
          path: artifacts/*.hap
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            artifacts/*.log
            **/build/reports/
          retention-days: 7
