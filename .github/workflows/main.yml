name: Build HAP

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'artwork/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build Mode'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build EhViewer HAP
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sanchuanhehe/harmony-next-pipeline-docker/harmonyos-ci-image:latest
      volumes:
        - ${{ github.workspace }}:/workspace

    env:
      # SDK 版本配置（与 build-profile.json5 保持一致）
      COMPILE_SDK_VERSION: "26.0.0"
      COMPATIBLE_SDK_VERSION: "6.0.0(20)"
      # 构建模式
      BUILD_MODE: ${{ github.event.inputs.build_mode || 'debug' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            oh-package.json5
            **/oh-package.json5

      - name: Configure SDK path
        run: |
          # 更新 local.properties 中的 SDK 路径为容器内路径
          echo "sdk.dir=/opt/harmonyos-sdk" > local.properties
          cat local.properties

      - name: Install ohpm dependencies
        run: |
          # 配置 ohpm 仓库
          ohpm config set registry https://ohpm.openharmony.cn/ohpm/
          
          # 安装项目依赖
          ohpm install --all
          
          # 验证 hvigorw 可执行
          chmod +x hvigorw 2>/dev/null || true
          ls -la hvigorw 2>/dev/null || echo "hvigorw not found in root, checking entry/"
          ls -la entry/hvigorw 2>/dev/null || true

      - name: Cache hvigor build
        uses: actions/cache@v4
        with:
          path: |
            ~/.hvigor
            **/.cxx
            **/build
            !entry/build/outputs
          key: ${{ runner.os }}-hvigor-${{ hashFiles('build-profile.json5', 'hvigorfile.ts', 'oh-package.json5') }}
          restore-keys: |
            ${{ runner.os }}-hvigor-

      - name: Build HAP (Debug)
        if: env.BUILD_MODE == 'debug'
        run: |
          echo "=== Building Debug HAP ==="
          ./hvigorw clean assembleHap \
            --mode module \
            -p product=default \
            -p buildMode=debug \
            --no-daemon
          
          echo "=== Build Output ==="
          find entry/build -name "*.hap" -type f 2>/dev/null || true
          find entry/build -name "*.app" -type f 2>/dev/null || true

      - name: Build HAP (Release)
        if: env.BUILD_MODE == 'release'
        run: |
          echo "=== Building Release HAP ==="
          ./hvigorw clean assembleHap \
            --mode module \
            -p product=default \
            -p buildMode=release \
            --no-daemon
          
          echo "=== Build Output ==="
          find entry/build -name "*.hap" -type f 2>/dev/null || true
          find entry/build -name "*.app" -type f 2>/dev/null || true

      - name: Collect build artifacts
        if: always()
        run: |
          mkdir -p artifacts/
          
          # 复制所有 HAP 产物
          find entry/build -name "*.hap" -type f -exec cp {} artifacts/ \; 2>/dev/null || true
          
          # 复制构建日志
          if [ -d "entry/build" ]; then
            find entry/build -name "*.log" -type f -exec cp {} artifacts/ \; 2>/dev/null || true
          fi
          
          # 列出产物
          echo "=== Artifacts ==="
          ls -lh artifacts/ || echo "No artifacts found"

      - name: Upload HAP artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EhViewer-OHOS-${{ env.BUILD_MODE }}-${{ github.sha }}
          path: artifacts/*.hap
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            artifacts/*.log
            entry/build/reports/
            **/build/reports/
          retention-days: 7

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep -oP '"version"\s*:\s*"\K[^"]+' oh-package.json5)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"
